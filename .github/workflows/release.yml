name: Release
run-name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v1.2.3
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-tag.outputs.value }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$tag" || "$tag" != v* ]]; then
            echo "release tag must start with v; got '$tag'" >&2
            exit 1
          fi

          printf 'value=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Ensure draft release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.release-tag.outputs.value }}"

          gh release create "$tag" \
            --draft \
            --verify-tag \
            --title "$tag" \
            --generate-notes

  build-and-upload:
    name: Build release asset (${{ matrix.asset_id }})
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_id: linux-x64
          - runner: macos-14
            asset_id: macos-arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.0"

      - name: Build portable Kast distribution
        run: ./release.sh --tag=${{ needs.prepare-release.outputs.release_tag }} --platform-id=${{ matrix.asset_id }}

      - name: Smoke portable Kast distribution
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="$RUNNER_TEMP/kast-dist"
          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"
          unzip -q kast/build/distributions/kast-*-portable.zip -d "$dist_dir"
          ./.github/scripts/smoke-kast-cli.sh "$dist_dir/kast/kast"

      - name: Upload release asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-${tag}-${{ matrix.asset_id }}.zip"
          asset_path="dist/${asset_name}"

          [[ -f "$asset_path" ]] || { echo "Release asset not found: $asset_path" >&2; exit 1; }
          gh release upload "$tag" "$asset_path" --clobber

  build-intellij-plugin:
    name: Build IntelliJ plugin
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.0"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/kast/intellij-distributions
            backend-standalone/build/compat
            backend-standalone/build/legacy-plugin-classes
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Build IntelliJ plugin
        run: >
          ./gradlew
          :backend-intellij:buildPlugin
          :backend-intellij:verifyPluginStructure

      - name: Upload IntelliJ plugin asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-intellij-${tag}.zip"
          asset_path="backend-intellij/build/distributions/${asset_name}"

          cp backend-intellij/build/distributions/*.zip "$asset_path"
          gh release upload "$tag" "$asset_path" --clobber

  publish-release:
    name: Publish release
    needs:
      - prepare-release
      - build-and-upload
      - build-intellij-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "${{ needs.prepare-release.outputs.release_tag }}" --draft=false --latest
