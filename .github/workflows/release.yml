name: Release
run-name: >-
  Release
  ${{
    github.event_name == 'workflow_dispatch'
      && format('{0} ({1})', inputs.release_type, github.ref_name)
      || github.ref_name
  }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: >
          Release type — automatically increments the latest semver tag.
          Beta appends the short commit SHA for uniqueness.
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch
          - beta

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Step 0 (workflow_dispatch only): auto-increment semver and push new tag ──
  bump-version:
    name: Bump version (${{ inputs.release_type }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Use GITHUB_TOKEN — pushes made with it do NOT re-trigger tag-push
          # workflows, preventing recursive runs.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next semver tag and push
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          release_type="${{ inputs.release_type }}"
          short_sha="${GITHUB_SHA:0:7}"

          # Resolve the latest vX.Y.Z tag (ignore pre-release tags for the base).
          latest_stable="$(git tag --list 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)"
          if [[ -z "$latest_stable" ]]; then
            latest_stable="v0.0.0"
          fi
          echo "Latest stable tag: ${latest_stable}"

          base="${latest_stable#v}"
          IFS='.' read -r major minor patch <<< "$base"
          major="${major:-0}"; minor="${minor:-0}"; patch="${patch:-0}"

          case "$release_type" in
            major)
              major=$((major + 1)); minor=0; patch=0
              new_tag="v${major}.${minor}.${patch}"
              ;;
            minor)
              minor=$((minor + 1)); patch=0
              new_tag="v${major}.${minor}.${patch}"
              ;;
            patch)
              patch=$((patch + 1))
              new_tag="v${major}.${minor}.${patch}"
              ;;
            beta)
              patch=$((patch + 1))
              new_tag="v${major}.${minor}.${patch}-beta.${short_sha}"
              ;;
            *)
              echo "Unknown release_type: ${release_type}" >&2
              exit 1
              ;;
          esac

          echo "New tag: ${new_tag}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$new_tag"
          git push origin "$new_tag"

          printf 'release_tag=%s\n' "$new_tag" >> "$GITHUB_OUTPUT"

  # ── Step 1: create draft GitHub release ──────────────────────────────────────
  prepare-release:
    name: Prepare release
    # Run after bump-version (workflow_dispatch) or directly (push tag).
    # 'always()' lets us proceed even when bump-version was skipped.
    needs: [bump-version]
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-tag.outputs.value }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ needs.bump-version.outputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$tag" || "$tag" != v* ]]; then
            echo "release tag must start with v; got '$tag'" >&2
            exit 1
          fi

          printf 'value=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Ensure draft release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.release-tag.outputs.value }}"

          gh release create "$tag" \
            --draft \
            --verify-tag \
            --title "$tag" \
            --generate-notes

  build-and-upload:
    name: Build release asset (${{ matrix.asset_id }})
    needs: [bump-version, prepare-release]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_id: linux-x64
          - runner: macos-14
            asset_id: macos-arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build portable Kast distribution
        shell: bash
        run: |
          set -euo pipefail
          ./kast.sh release --tag "${{ needs.prepare-release.outputs.release_tag }}" --platform-id "${{ matrix.asset_id }}"

      - name: Smoke portable Kast distribution
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="$RUNNER_TEMP/kast-dist"
          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"
          unzip -q kast-cli/build/distributions/kast-cli-*-portable.zip -d "$dist_dir"
          "$dist_dir/kast-cli/kast-cli" --help

      - name: Write build provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          digest=""
          if [[ -f dist/checksums.txt ]]; then
            digest="$(grep '${{ matrix.asset_id }}' dist/checksums.txt | awk '{print $1}' || true)"
          fi
          cat > dist/build-provenance-${{ matrix.asset_id }}.json <<PROVEOF
          {
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "runAttempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "workflowRef": "${{ github.workflow_ref }}",
            "actor": "${{ github.actor }}",
            "platformId": "${{ matrix.asset_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "assetDigest": "sha256:${digest}"
          }
          PROVEOF

      - name: Upload release asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-${tag}-${{ matrix.asset_id }}.zip"
          asset_path="dist/${asset_name}"

          [[ -f "$asset_path" ]] || { echo "Release asset not found: $asset_path" >&2; exit 1; }
          gh release upload "$tag" "$asset_path" --clobber

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.asset_id }}-${{ github.run_id }}
          path: |
            dist/
            kast-cli/build/distributions/
          if-no-files-found: warn

  build-intellij-plugin:
    name: Build IntelliJ plugin
    needs: [bump-version, prepare-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/cache@v4
        with:
          path: ~/.gradle/kast/intellij-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Build IntelliJ plugin
        run: >
          ./gradlew
          :backend-intellij:buildPlugin
          :backend-intellij:verifyPluginStructure
          :backend-intellij:verifyPluginXmlPresent

      - name: Upload IntelliJ plugin asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-intellij-${tag}.zip"

          source_zip=""
          for candidate in backend-intellij/build/distributions/*.zip; do
            [[ -f "$candidate" ]] || continue
            source_zip="$candidate"
            break
          done
          [[ -n "$source_zip" ]] || { echo "No IntelliJ plugin zip found" >&2; exit 1; }

          mkdir -p dist
          cp "$source_zip" "dist/${asset_name}"
          gh release upload "$tag" "dist/${asset_name}" --clobber

      - name: Write plugin build provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cat > dist/build-provenance-intellij.json <<PROVEOF
          {
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "runAttempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "workflowRef": "${{ github.workflow_ref }}",
            "actor": "${{ github.actor }}",
            "platformId": "intellij",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          PROVEOF

      - name: Upload plugin artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intellij-plugin-${{ github.run_id }}
          path: |
            dist/
            backend-intellij/build/distributions/
          if-no-files-found: warn

  build-standalone-backend:
    name: Build standalone backend
    needs: [bump-version, prepare-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build standalone backend
        run: ./kast.sh build backend

      - name: Upload standalone backend asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-standalone-${tag}.zip"

          source_zip="dist/backend.zip"
          [[ -f "$source_zip" ]] || { echo "Backend zip not found: $source_zip" >&2; exit 1; }

          mkdir -p dist
          cp "$source_zip" "dist/${asset_name}"
          gh release upload "$tag" "dist/${asset_name}" --clobber

      - name: Write standalone backend build provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cat > dist/build-provenance-standalone.json <<PROVEOF
          {
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "runAttempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "workflowRef": "${{ github.workflow_ref }}",
            "actor": "${{ github.actor }}",
            "platformId": "standalone",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          PROVEOF

      - name: Upload standalone backend artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: standalone-backend-${{ github.run_id }}
          path: |
            dist/
            backend-standalone/build/distributions/
          if-no-files-found: warn

  publish-release:
    name: Publish release
    needs:
      - bump-version
      - prepare-release
      - build-and-upload
      - build-intellij-plugin
      - build-standalone-backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all provenance artifacts
        uses: actions/download-artifact@v4
        with:
          path: provenance-artifacts
          pattern: release-asset-*

      - name: Download IntelliJ provenance
        uses: actions/download-artifact@v4
        with:
          path: provenance-intellij
          pattern: intellij-plugin-*

      - name: Download standalone backend provenance
        uses: actions/download-artifact@v4
        with:
          path: provenance-standalone
          pattern: standalone-backend-*

      - name: Assemble combined provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          # Collect all individual provenance files into a JSON array
          provenance_files=()
          for f in provenance-artifacts/*/dist/build-provenance-*.json provenance-intellij/*/dist/build-provenance-*.json provenance-standalone/*/dist/build-provenance-*.json; do
            [[ -f "$f" ]] || continue
            provenance_files+=("$f")
          done

          if [[ ${#provenance_files[@]} -gt 0 ]]; then
            python3 -c "
          import json, sys, glob
          files = sys.argv[1:]
          entries = []
          for f in files:
              with open(f) as fh:
                  entries.append(json.load(fh))
          print(json.dumps({'builds': entries}, indent=2))
          " "${provenance_files[@]}" > dist/build-provenance.json
          else
            echo '{"builds": []}' > dist/build-provenance.json
          fi

      - name: Upload combined provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          gh release upload "$tag" dist/build-provenance.json --clobber

      - name: Publish draft release with provenance annotation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh release edit "$tag" --draft=false --latest \
            --notes "$(gh release view "$tag" --json body -q .body)

          ---
          **Build provenance:** [CI Run #${{ github.run_number }}]($run_url)"
