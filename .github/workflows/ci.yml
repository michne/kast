name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/cache@v4
        with:
          path: ~/.gradle/kast/intellij-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Test and build portable distribution
        run: >
          ./gradlew
          :analysis-api:test
          :analysis-server:test
          :backend-standalone:test
          :kast-cli:test
          :kast-cli:portableDistZip

      - name: Upload portable distribution
        uses: actions/upload-artifact@v4
        with:
          name: kast-portable-${{ matrix.os }}
          path: kast-cli/build/distributions/kast-cli-*-portable.zip
          if-no-files-found: error
          retention-days: 1

  test-intellij-plugin:
    name: IntelliJ plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/cache@v4
        with:
          path: ~/.gradle/kast/intellij-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Test and verify IntelliJ plugin
        run: >
          ./gradlew
          :backend-intellij:test
          :backend-intellij:buildPlugin
          :backend-intellij:verifyPluginStructure
          :backend-intellij:verifyPluginXmlPresent

      - name: Upload IntelliJ plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: kast-intellij-plugin
          path: backend-intellij/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 1

      - name: Run IntelliJ performance baselines
        run: ./gradlew :backend-intellij:test -PincludeTags=performance

  smoke-kast-cli:
    name: Smoke CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download portable distribution
        uses: actions/download-artifact@v4
        with:
          name: kast-portable-${{ matrix.os }}
          path: kast-cli/build/distributions

      - name: Smoke portable Kast distribution
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="$RUNNER_TEMP/kast-dist"
          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"
          unzip -q kast-cli/build/distributions/kast-cli-*-portable.zip -d "$dist_dir"
          "$dist_dir/kast-cli/kast-cli" --help

      - name: Validate skill JSON contracts
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="$RUNNER_TEMP/kast-dist"
          KAST_BIN="$dist_dir/kast-cli/kast-cli"
          STANDALONE_BIN="$dist_dir/kast-cli/kast-standalone"
          export KAST_CONFIG_HOME="$RUNNER_TEMP/kast-config"
          workspace="$RUNNER_TEMP/kast-skill-contracts"
          source_file="$workspace/src/main/kotlin/sample/Greeter.kt"
          mkdir -p "$(dirname "$source_file")"
          cat > "$source_file" <<'EOF'
          package sample

          fun greet(name: String): String = "hi $name"
          EOF

          # Start the standalone backend in the background
          "$STANDALONE_BIN" --workspace-root="$workspace" &
          STANDALONE_PID=$!
          trap "kill $STANDALONE_PID 2>/dev/null || true" EXIT

          # Wait for the backend to be READY (up to 120s)
          for i in $(seq 1 120); do
            status_out="$("$KAST_BIN" workspace status --workspace-root="$workspace" 2>/dev/null || true)"
            if echo "$status_out" | python3 -c "import json,sys; d=json.load(sys.stdin); exit(0 if d.get('servable') else 1)" 2>/dev/null; then
              break
            fi
            sleep 1
          done

          resolve_request="$(python3 - <<'PY' "$workspace" "$source_file"
          import json, sys
          print(json.dumps({
              "workspaceRoot": sys.argv[1],
              "symbol": "greet",
              "fileHint": sys.argv[2],
          }))
          PY
          )"
          resolve_output="$("$KAST_BIN" skill resolve "$resolve_request")"
          python3 - <<'PY' "$resolve_output"
          import json, sys
          payload = json.loads(sys.argv[1])
          assert payload["ok"] is True, payload
          assert payload["type"] == "RESOLVE_SUCCESS", payload
          PY

          diagnostics_request="$RUNNER_TEMP/diagnostics-request.json"
          python3 - <<'PY' "$workspace" "$source_file" "$diagnostics_request"
          import json, pathlib, sys
          pathlib.Path(sys.argv[3]).write_text(json.dumps({
              "workspaceRoot": sys.argv[1],
              "filePaths": [sys.argv[2]],
          }), encoding="utf-8")
          PY
          diagnostics_output="$("$KAST_BIN" skill diagnostics "$diagnostics_request")"
          python3 - <<'PY' "$diagnostics_output"
          import json, sys
          payload = json.loads(sys.argv[1])
          assert payload["ok"] is True, payload
          assert payload["type"] == "DIAGNOSTICS_SUCCESS", payload
          PY

      - name: Smoke installer
        shell: bash
        run: ./.github/scripts/smoke-installer.sh

  eval-agent-routing:
    name: Eval agent routing
    runs-on: ubuntu-latest
    needs: smoke-kast-cli
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download portable distribution
        uses: actions/download-artifact@v4
        with:
          name: kast-portable-ubuntu-latest
          path: kast-cli/build/distributions

      - name: Prepare kast binary
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="$RUNNER_TEMP/kast-dist"
          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"
          unzip -q kast-cli/build/distributions/kast-cli-*-portable.zip -d "$dist_dir"
          echo "KAST_BIN=$dist_dir/kast-cli/kast-cli" >> "$GITHUB_ENV"

      - name: Run skill evaluation
        shell: bash
        run: |
          set -euo pipefail
          "$KAST_BIN" eval skill --skill-dir="$GITHUB_WORKSPACE/.agents/skills/kast" > "$RUNNER_TEMP/eval-result.json"
          echo "=== Eval Result ==="
          cat "$RUNNER_TEMP/eval-result.json" | python3 -c "import sys, json; d=json.load(sys.stdin); print(f'Score: {d[\"summary\"][\"score\"]}/100 ({d[\"summary\"][\"grade\"]})')"

      - name: Upload eval result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-eval-result
          path: ${{ runner.temp }}/eval-result.json
          retention-days: 30
