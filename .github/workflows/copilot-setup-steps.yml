name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache IntelliJ distribution
        uses: actions/cache@v4
        with:
          path: ~/.gradle/kast/intellij-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Build kast portable distribution
        run: ./gradlew --no-daemon :kast-cli:syncPortableDist

      - name: Export kast environment
        run: |
          KAST_DIST_DIR="$GITHUB_WORKSPACE/kast-cli/build/portable-dist/kast-cli"
          echo "KAST_CLI_PATH=${KAST_DIST_DIR}/kast-cli" >> "$GITHUB_ENV"
          echo "KAST_STANDALONE_PATH=${KAST_DIST_DIR}/kast-standalone" >> "$GITHUB_ENV"
          echo "${KAST_DIST_DIR}" >> "$GITHUB_PATH"
