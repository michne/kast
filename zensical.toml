[project]
site_name = "Kast"
site_description = """
Kast exposes Kotlin analysis through one repo-local CLI workflow.
"""
site_author = "amichne"
site_url = "https://amichne.github.io/kast/"
repo_url = "https://github.com/amichne/kast"
repo_name = "amichne/kast"
edit_uri = "edit/main/docs"
docs_dir = "docs"
site_dir = "site"
copyright = """
Copyright &copy; 2026 amichne
"""
nav = [
  { "Overview" = "index.md" },
  { "Get started" = "get-started.md" },
  { "Run analysis commands" = "run-analysis-commands.md" },
  { "Command reference" = "command-reference.md" },
]

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.theme]
language = "en"
features = [
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.tabs.link",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/network"
repo = "fontawesome/brands/github"
edit = "material/file-edit-outline"
view = "material/file-eye-outline"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
