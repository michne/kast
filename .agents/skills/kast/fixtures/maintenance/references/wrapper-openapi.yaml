openapi: 3.1.0
info:
  title: kast skill contracts
  version: 1.1.0
  description: >
    Generated from the native kast skill request and response serializers.
servers:
  - url: kast://skill
    description: Native kast skill command surface
paths:
  "/skill/resolve":
    post:
      operationId: kastSkillResolve
      summary: Resolve a symbol by name
      x-command: kast skill resolve
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/KastResolveRequest"
      responses:
        "200":
          description: Wrapper JSON response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/KastResolveResponse"
  "/skill/references":
    post:
      operationId: kastSkillReferences
      summary: Find references for a named symbol
      x-command: kast skill references
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/KastReferencesRequest"
      responses:
        "200":
          description: Wrapper JSON response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/KastReferencesResponse"
  "/skill/callers":
    post:
      operationId: kastSkillCallers
      summary: Expand an incoming or outgoing call hierarchy
      x-command: kast skill callers
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/KastCallersRequest"
      responses:
        "200":
          description: Wrapper JSON response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/KastCallersResponse"
  "/skill/diagnostics":
    post:
      operationId: kastSkillDiagnostics
      summary: Run diagnostics on Kotlin files
      x-command: kast skill diagnostics
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/KastDiagnosticsRequest"
      responses:
        "200":
          description: Wrapper JSON response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/KastDiagnosticsResponse"
  "/skill/rename":
    post:
      operationId: kastSkillRename
      summary: Resolve or target a symbol and apply a rename
      x-command: kast skill rename
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/KastRenameRequest"
      responses:
        "200":
          description: Wrapper JSON response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/KastRenameResponse"
  "/skill/scaffold":
    post:
      operationId: kastSkillScaffold
      summary: Gather structural generation context
      x-command: kast skill scaffold
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/KastScaffoldRequest"
      responses:
        "200":
          description: Wrapper JSON response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/KastScaffoldResponse"
  "/skill/workspace-files":
    post:
      operationId: kastSkillWorkspaceFiles
      summary: List workspace modules and optional file paths
      x-command: kast skill workspace-files
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/KastWorkspaceFilesRequest"
      responses:
        "200":
          description: Wrapper JSON response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/KastWorkspaceFilesResponse"
  "/skill/write-and-validate":
    post:
      operationId: kastSkillWriteAndValidate
      summary: Apply generated Kotlin code and validate the result
      x-command: kast skill write-and-validate
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              $ref: "#/components/schemas/KastWriteAndValidateRequest"
      responses:
        "200":
          description: Wrapper JSON response
          content:
            "application/json":
              schema:
                $ref: "#/components/schemas/KastWriteAndValidateResponse"
components:
  schemas:
    ApiErrorResponse:
      type: object
      properties:
        schemaVersion:
          type: integer
          format: int32
        requestId:
          type: string
        code:
          type: string
        message:
          type: string
        retryable:
          type: boolean
        details:
          type: object
          additionalProperties:
            type: string
      additionalProperties: false
      required:
        - requestId
        - code
        - message
        - retryable
    KastResolveRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        symbol:
          type: string
        fileHint:
          anyOf:
            -
              type: string
            -
              type: null
        kind:
          anyOf:
            -
              $ref: "#/components/schemas/WrapperNamedSymbolKind"
            -
              type: null
        containingType:
          anyOf:
            -
              type: string
            -
              type: null
      additionalProperties: false
      required:
        - symbol
    WrapperNamedSymbolKind:
      type: string
      enum:
        - class
        - interface
        - object
        - function
        - property
    KastReferencesRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        symbol:
          type: string
        fileHint:
          anyOf:
            -
              type: string
            -
              type: null
        kind:
          anyOf:
            -
              $ref: "#/components/schemas/WrapperNamedSymbolKind"
            -
              type: null
        containingType:
          anyOf:
            -
              type: string
            -
              type: null
        includeDeclaration:
          type: boolean
      additionalProperties: false
      required:
        - symbol
    KastCallersRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        symbol:
          type: string
        fileHint:
          anyOf:
            -
              type: string
            -
              type: null
        kind:
          anyOf:
            -
              $ref: "#/components/schemas/WrapperNamedSymbolKind"
            -
              type: null
        containingType:
          anyOf:
            -
              type: string
            -
              type: null
        direction:
          $ref: "#/components/schemas/WrapperCallDirection"
        depth:
          type: integer
          format: int32
        maxTotalCalls:
          anyOf:
            -
              type: integer
              format: int32
            -
              type: null
        maxChildrenPerNode:
          anyOf:
            -
              type: integer
              format: int32
            -
              type: null
        timeoutMillis:
          anyOf:
            -
              type: integer
              format: int32
            -
              type: null
      additionalProperties: false
      required:
        - symbol
    WrapperCallDirection:
      type: string
      enum:
        - incoming
        - outgoing
    KastDiagnosticsRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        filePaths:
          type: array
          items:
            type: string
      additionalProperties: false
      required:
        - filePaths
    KastRenameBySymbolRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        symbol:
          type: string
        newName:
          type: string
        fileHint:
          anyOf:
            -
              type: string
            -
              type: null
        kind:
          anyOf:
            -
              $ref: "#/components/schemas/WrapperNamedSymbolKind"
            -
              type: null
        containingType:
          anyOf:
            -
              type: string
            -
              type: null
        type:
          type: string
          const: RENAME_BY_SYMBOL_REQUEST
      additionalProperties: false
      required:
        - symbol
        - newName
        - type
    KastRenameByOffsetRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        filePath:
          type: string
        offset:
          type: integer
          format: int32
        newName:
          type: string
        type:
          type: string
          const: RENAME_BY_OFFSET_REQUEST
      additionalProperties: false
      required:
        - filePath
        - offset
        - newName
        - type
    KastRenameRequest:
      oneOf:
        -
          $ref: "#/components/schemas/KastRenameBySymbolRequest"
        -
          $ref: "#/components/schemas/KastRenameByOffsetRequest"
      discriminator:
        propertyName: type
        mapping:
          RENAME_BY_SYMBOL_REQUEST: "#/components/schemas/KastRenameBySymbolRequest"
          RENAME_BY_OFFSET_REQUEST: "#/components/schemas/KastRenameByOffsetRequest"
    KastScaffoldRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        targetFile:
          type: string
        targetSymbol:
          anyOf:
            -
              type: string
            -
              type: null
        mode:
          $ref: "#/components/schemas/WrapperScaffoldMode"
        kind:
          anyOf:
            -
              $ref: "#/components/schemas/WrapperNamedSymbolKind"
            -
              type: null
      additionalProperties: false
      required:
        - targetFile
    WrapperScaffoldMode:
      type: string
      enum:
        - implement
        - replace
        - consolidate
        - extract
    KastWorkspaceFilesRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        moduleName:
          anyOf:
            -
              type: string
            -
              type: null
        includeFiles:
          type: boolean
      additionalProperties: false
    KastWriteAndValidateCreateFileRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        filePath:
          type: string
        content:
          anyOf:
            -
              type: string
            -
              type: null
        contentFile:
          anyOf:
            -
              type: string
            -
              type: null
        type:
          type: string
          const: CREATE_FILE_REQUEST
      additionalProperties: false
      required:
        - filePath
        - type
    KastWriteAndValidateInsertAtOffsetRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        filePath:
          type: string
        offset:
          type: integer
          format: int32
        content:
          anyOf:
            -
              type: string
            -
              type: null
        contentFile:
          anyOf:
            -
              type: string
            -
              type: null
        type:
          type: string
          const: INSERT_AT_OFFSET_REQUEST
      additionalProperties: false
      required:
        - filePath
        - offset
        - type
    KastWriteAndValidateReplaceRangeRequest:
      type: object
      properties:
        workspaceRoot:
          anyOf:
            -
              type: string
            -
              type: null
        filePath:
          type: string
        startOffset:
          type: integer
          format: int32
        endOffset:
          type: integer
          format: int32
        content:
          anyOf:
            -
              type: string
            -
              type: null
        contentFile:
          anyOf:
            -
              type: string
            -
              type: null
        type:
          type: string
          const: REPLACE_RANGE_REQUEST
      additionalProperties: false
      required:
        - filePath
        - startOffset
        - endOffset
        - type
    KastWriteAndValidateRequest:
      oneOf:
        -
          $ref: "#/components/schemas/KastWriteAndValidateCreateFileRequest"
        -
          $ref: "#/components/schemas/KastWriteAndValidateInsertAtOffsetRequest"
        -
          $ref: "#/components/schemas/KastWriteAndValidateReplaceRangeRequest"
      discriminator:
        propertyName: type
        mapping:
          CREATE_FILE_REQUEST: "#/components/schemas/KastWriteAndValidateCreateFileRequest"
          INSERT_AT_OFFSET_REQUEST: "#/components/schemas/KastWriteAndValidateInsertAtOffsetRequest"
          REPLACE_RANGE_REQUEST: "#/components/schemas/KastWriteAndValidateReplaceRangeRequest"
    KastRenameBySymbolQuery:
      type: object
      properties:
        workspaceRoot:
          type: string
        symbol:
          type: string
        newName:
          type: string
        fileHint:
          anyOf:
            -
              type: string
            -
              type: null
        kind:
          anyOf:
            -
              $ref: "#/components/schemas/WrapperNamedSymbolKind"
            -
              type: null
        containingType:
          anyOf:
            -
              type: string
            -
              type: null
        filePath:
          type: string
        offset:
          type: integer
          format: int32
        type:
          type: string
          const: RENAME_BY_SYMBOL_REQUEST
      additionalProperties: false
      required:
        - workspaceRoot
        - symbol
        - newName
        - filePath
        - offset
        - type
    KastRenameByOffsetQuery:
      type: object
      properties:
        workspaceRoot:
          type: string
        filePath:
          type: string
        offset:
          type: integer
          format: int32
        newName:
          type: string
        type:
          type: string
          const: RENAME_BY_OFFSET_REQUEST
      additionalProperties: false
      required:
        - workspaceRoot
        - filePath
        - offset
        - newName
        - type
    KastWriteAndValidateCreateFileQuery:
      type: object
      properties:
        workspaceRoot:
          type: string
        filePath:
          type: string
        type:
          type: string
          const: CREATE_FILE_REQUEST
      additionalProperties: false
      required:
        - workspaceRoot
        - filePath
        - type
    KastWriteAndValidateInsertAtOffsetQuery:
      type: object
      properties:
        workspaceRoot:
          type: string
        filePath:
          type: string
        offset:
          type: integer
          format: int32
        type:
          type: string
          const: INSERT_AT_OFFSET_REQUEST
      additionalProperties: false
      required:
        - workspaceRoot
        - filePath
        - offset
        - type
    KastWriteAndValidateReplaceRangeQuery:
      type: object
      properties:
        workspaceRoot:
          type: string
        filePath:
          type: string
        startOffset:
          type: integer
          format: int32
        endOffset:
          type: integer
          format: int32
        type:
          type: string
          const: REPLACE_RANGE_REQUEST
      additionalProperties: false
      required:
        - workspaceRoot
        - filePath
        - startOffset
        - endOffset
        - type
    KastResolveSuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
        query:
          $ref: "#/components/schemas/KastResolveQuery"
        symbol:
          $ref: "#/components/schemas/Symbol"
        filePath:
          type: string
        offset:
          type: integer
          format: int32
        candidate:
          $ref: "#/components/schemas/KastCandidate"
        candidateCount:
          anyOf:
            -
              type: integer
              format: int32
            -
              type: null
        alternatives:
          anyOf:
            -
              type: array
              items:
                type: string
            -
              type: null
        logFile:
          type: string
        type:
          type: string
          const: RESOLVE_SUCCESS
      additionalProperties: false
      required:
        - query
        - symbol
        - filePath
        - offset
        - candidate
        - logFile
        - type
    KastResolveQuery:
      type: object
      properties:
        workspaceRoot:
          type: string
        symbol:
          type: string
        fileHint:
          anyOf:
            -
              type: string
            -
              type: null
        kind:
          anyOf:
            -
              $ref: "#/components/schemas/WrapperNamedSymbolKind"
            -
              type: null
        containingType:
          anyOf:
            -
              type: string
            -
              type: null
      additionalProperties: false
      required:
        - workspaceRoot
        - symbol
    Symbol:
      type: object
      properties:
        fqName:
          type: string
        kind:
          $ref: "#/components/schemas/SymbolKind"
        location:
          $ref: "#/components/schemas/Location"
        type:
          anyOf:
            -
              type: string
            -
              type: null
        returnType:
          anyOf:
            -
              type: string
            -
              type: null
        parameters:
          anyOf:
            -
              type: array
              items:
                $ref: "#/components/schemas/ParameterInfo"
            -
              type: null
        documentation:
          anyOf:
            -
              type: string
            -
              type: null
        containingDeclaration:
          anyOf:
            -
              type: string
            -
              type: null
        supertypes:
          anyOf:
            -
              type: array
              items:
                type: string
            -
              type: null
        visibility:
          anyOf:
            -
              $ref: "#/components/schemas/SymbolVisibility"
            -
              type: null
        declarationScope:
          anyOf:
            -
              $ref: "#/components/schemas/DeclarationScope"
            -
              type: null
      additionalProperties: false
      required:
        - fqName
        - kind
        - location
    SymbolKind:
      type: string
      enum:
        - CLASS
        - INTERFACE
        - OBJECT
        - FUNCTION
        - PROPERTY
        - PARAMETER
        - UNKNOWN
    Location:
      type: object
      properties:
        filePath:
          type: string
        startOffset:
          type: integer
          format: int32
        endOffset:
          type: integer
          format: int32
        startLine:
          type: integer
          format: int32
        startColumn:
          type: integer
          format: int32
        preview:
          type: string
      additionalProperties: false
      required:
        - filePath
        - startOffset
        - endOffset
        - startLine
        - startColumn
        - preview
    ParameterInfo:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        defaultValue:
          anyOf:
            -
              type: string
            -
              type: null
        isVararg:
          type: boolean
      additionalProperties: false
      required:
        - name
        - type
    SymbolVisibility:
      type: string
      enum:
        - PUBLIC
        - INTERNAL
        - PROTECTED
        - PRIVATE
        - LOCAL
        - UNKNOWN
    DeclarationScope:
      type: object
      properties:
        startOffset:
          type: integer
          format: int32
        endOffset:
          type: integer
          format: int32
        startLine:
          type: integer
          format: int32
        endLine:
          type: integer
          format: int32
        sourceText:
          anyOf:
            -
              type: string
            -
              type: null
      additionalProperties: false
      required:
        - startOffset
        - endOffset
        - startLine
        - endLine
    KastCandidate:
      type: object
      properties:
        line:
          type: integer
          format: int32
        column:
          type: integer
          format: int32
        context:
          type: string
      additionalProperties: false
      required:
        - line
        - column
        - context
    KastResolveFailureResponse:
      type: object
      properties:
        ok:
          type: boolean
        stage:
          type: string
        message:
          type: string
        query:
          $ref: "#/components/schemas/KastResolveQuery"
        logFile:
          type: string
        error:
          anyOf:
            -
              $ref: "#/components/schemas/ApiErrorResponse"
            -
              type: null
        errorText:
          anyOf:
            -
              type: string
            -
              type: null
        type:
          type: string
          const: RESOLVE_FAILURE
      additionalProperties: false
      required:
        - stage
        - message
        - query
        - logFile
        - type
    KastResolveResponse:
      oneOf:
        -
          $ref: "#/components/schemas/KastResolveSuccessResponse"
        -
          $ref: "#/components/schemas/KastResolveFailureResponse"
      discriminator:
        propertyName: type
        mapping:
          RESOLVE_SUCCESS: "#/components/schemas/KastResolveSuccessResponse"
          RESOLVE_FAILURE: "#/components/schemas/KastResolveFailureResponse"
    KastReferencesSuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
        query:
          $ref: "#/components/schemas/KastReferencesQuery"
        symbol:
          $ref: "#/components/schemas/Symbol"
        filePath:
          type: string
        offset:
          type: integer
          format: int32
        references:
          type: array
          items:
            $ref: "#/components/schemas/Location"
        searchScope:
          anyOf:
            -
              $ref: "#/components/schemas/SearchScope"
            -
              type: null
        declaration:
          anyOf:
            -
              $ref: "#/components/schemas/Symbol"
            -
              type: null
        candidateCount:
          anyOf:
            -
              type: integer
              format: int32
            -
              type: null
        alternatives:
          anyOf:
            -
              type: array
              items:
                type: string
            -
              type: null
        logFile:
          type: string
        type:
          type: string
          const: REFERENCES_SUCCESS
      additionalProperties: false
      required:
        - query
        - symbol
        - filePath
        - offset
        - references
        - logFile
        - type
    KastReferencesQuery:
      type: object
      properties:
        workspaceRoot:
          type: string
        symbol:
          type: string
        fileHint:
          anyOf:
            -
              type: string
            -
              type: null
        kind:
          anyOf:
            -
              $ref: "#/components/schemas/WrapperNamedSymbolKind"
            -
              type: null
        containingType:
          anyOf:
            -
              type: string
            -
              type: null
        includeDeclaration:
          type: boolean
      additionalProperties: false
      required:
        - workspaceRoot
        - symbol
    SearchScope:
      type: object
      properties:
        visibility:
          $ref: "#/components/schemas/SymbolVisibility"
        scope:
          $ref: "#/components/schemas/SearchScopeKind"
        exhaustive:
          type: boolean
        candidateFileCount:
          type: integer
          format: int32
        searchedFileCount:
          type: integer
          format: int32
      additionalProperties: false
      required:
        - visibility
        - scope
        - exhaustive
        - candidateFileCount
        - searchedFileCount
    SearchScopeKind:
      type: string
      enum:
        - FILE
        - MODULE
        - DEPENDENT_MODULES
    KastReferencesFailureResponse:
      type: object
      properties:
        ok:
          type: boolean
        stage:
          type: string
        message:
          type: string
        query:
          $ref: "#/components/schemas/KastReferencesQuery"
        logFile:
          type: string
        error:
          anyOf:
            -
              $ref: "#/components/schemas/ApiErrorResponse"
            -
              type: null
        errorText:
          anyOf:
            -
              type: string
            -
              type: null
        type:
          type: string
          const: REFERENCES_FAILURE
      additionalProperties: false
      required:
        - stage
        - message
        - query
        - logFile
        - type
    KastReferencesResponse:
      oneOf:
        -
          $ref: "#/components/schemas/KastReferencesSuccessResponse"
        -
          $ref: "#/components/schemas/KastReferencesFailureResponse"
      discriminator:
        propertyName: type
        mapping:
          REFERENCES_SUCCESS: "#/components/schemas/KastReferencesSuccessResponse"
          REFERENCES_FAILURE: "#/components/schemas/KastReferencesFailureResponse"
    KastCallersSuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
        query:
          $ref: "#/components/schemas/KastCallersQuery"
        symbol:
          $ref: "#/components/schemas/Symbol"
        filePath:
          type: string
        offset:
          type: integer
          format: int32
        root:
          $ref: "#/components/schemas/CallNode"
        stats:
          $ref: "#/components/schemas/CallHierarchyStats"
        candidateCount:
          anyOf:
            -
              type: integer
              format: int32
            -
              type: null
        alternatives:
          anyOf:
            -
              type: array
              items:
                type: string
            -
              type: null
        logFile:
          type: string
        type:
          type: string
          const: CALLERS_SUCCESS
      additionalProperties: false
      required:
        - query
        - symbol
        - filePath
        - offset
        - root
        - stats
        - logFile
        - type
    KastCallersQuery:
      type: object
      properties:
        workspaceRoot:
          type: string
        symbol:
          type: string
        fileHint:
          anyOf:
            -
              type: string
            -
              type: null
