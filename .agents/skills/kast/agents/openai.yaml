interface:
  display_name: "Kast"
  short_description: "Native Kotlin semantic analysis via `kast skill` subcommands"
  default_prompt: >
    Treat `.agents/skills/kast/SKILL.md` as the sole source of truth. Resolve
    the binary with `bash scripts/resolve-kast.sh`, then call
    `"$KAST" skill <command> <json>` with exactly one JSON argument matching
    `references/wrapper-openapi.yaml`.
